<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hime's Deck</title>
	<link rel="stylesheet" href="journey.css">
</head>

<body>
<div class="container">
	<div class="header">
		<input id="spreadSelect" class="textbox headerinput" type="number" min="1" max="86" placeholder="NUM">
		<button id="randomButton" class="headerinput">SET</button>
		<button id="draw" class="headerinput">DRAW</button>
		<button id="clear" class="headerinput">NEW</button>
	</div>
	<div class="result" id="result">
	</div>
</div>
<script src="journey.js"></script>
<script>
	
	let numberOfData = []; // Mảng lưu các giá trị random {a, b}
	let usedValues = new Set(); // Tập hợp lưu các giá trị a đã được sử dụng

	document.getElementById('clear').disabled = true; // Vô hiệu hóa nút CLEAR
	document.getElementById('draw').disabled = true; // Vô hiệu hóa nút DRAW

	document.getElementById('randomButton').addEventListener('click', () => {
		// Làm rỗng mảng và tập hợp trước khi thêm giá trị mới
		numberOfData = [];
		usedValues.clear();

		const spreadInput = document.getElementById('spreadSelect');
		const spreadCount = parseInt(spreadInput.value) || 1; // Giá trị mặc định là 1 nếu không nhập gì

		// Kiểm tra giá trị hợp lệ
		if (isNaN(spreadCount) || spreadCount < 1 || spreadCount > 76) {
			alert('Vui lòng nhập số lượng lá bài từ 1 đến 76.');
			return;
		}

		// Kích hoạt hoặc vô hiệu hóa nút DRAW và CLEAR
		document.getElementById('draw').disabled = spreadCount === 1; // Vô hiệu hóa DRAW nếu chỉ có 1 lá bài
		document.getElementById('clear').disabled = false; // Kích hoạt nút CLEAR

		// Tạo giá trị đầu tiên cho mảng `numberOfData`
		let randomA;
		do {
			randomA = Math.floor(Math.random() * 76) + 1; // Giá trị a random từ 1 tới 86
		} while (usedValues.has(randomA));
		usedValues.add(randomA);

		const randomB = (Math.floor(Math.random() * 1000) + 1) % 2; // Giá trị b random từ 1 tới 1000, sau đó mod 2
		const side = randomB === 1 ? "upright" : "reversed"; // Gán "upright" hoặc "reversed" dựa trên giá trị b

		const card = data1[randomA - 1]; // Lấy thông tin card từ data1 (chỉ số a-1)
		const meaning = randomB === 1 ? Umeaning[randomA - 1] : Rmeaning[randomA - 1]; // Lấy nghĩa từ Umeaning hoặc Rmeaning

		numberOfData.push({
			a: randomA,
			b: randomB,
			cardname: card.text,
			img: card.img,
			side: side,
			meaning: meaning.text,
		});

		// Hiển thị giá trị đầu tiên trong result
		const resultDiv = document.getElementById('result');
		resultDiv.innerHTML = ''; // Xóa kết quả cũ
		const firstCard = numberOfData[0]; // Phần tử đầu tiên
		resultDiv.innerHTML += `
			<div class="cardbox ${firstCard.side}">
				<div class="front" style="background-image: url('${firstCard.img}');"></div>
				<div class="back hidden">
					<div class="text">
						<div class="cardname">${firstCard.cardname}
						<div class="side">${firstCard.side}</div>
						<div class="meaning">${firstCard.meaning}</div>
					</div>
				</div>
			</div>
		`;
		attachFlipLogic(); // Gọi hàm flip

		// Vô hiệu hóa nút SET và khung nhập input
		document.getElementById('randomButton').disabled = true;
		spreadInput.disabled = true;
	});
	//draw button
	let currentDraw = 2; // Bắt đầu từ lá thứ 2

	document.getElementById('draw').addEventListener('click', () => {
		const spreadInput = document.getElementById('spreadSelect');
		const spreadCount = parseInt(spreadInput.value); // Lấy số lượng lá bài từ input

		// Kiểm tra nếu currentDraw <= spreadCount
		if (currentDraw <= spreadCount) {
			let randomA;
			do {
				randomA = Math.floor(Math.random() * 76) + 1; // Giá trị a random từ 1 tới 86
			} while (usedValues.has(randomA));
			usedValues.add(randomA);

			const randomB = (Math.floor(Math.random() * 1000) + 1) % 2; // Giá trị b random từ 1 tới 1000, sau đó mod 2
			const side = randomB === 1 ? "upright" : "reversed"; // Gán "upright" hoặc "reversed" dựa trên giá trị b

			const card = data1[randomA - 1]; // Lấy thông tin card từ data1 (chỉ số a-1)
			const meaning = randomB === 1 ? Umeaning[randomA - 1] : Rmeaning[randomA - 1]; // Lấy nghĩa từ Umeaning hoặc Rmeaning

			numberOfData.push({
				a: randomA,
				b: randomB,
				cardname: card.text,
				img: card.img,
				side: side,
				meaning: meaning.text,
			});

			// Vẽ thêm cardbox vào result
			const resultDiv = document.getElementById('result');
			resultDiv.innerHTML += `
				<div id="card-${currentDraw}" class="cardbox ${side}">
					<div class="front" style="background-image: url('${card.img}');"></div>
					<div class="back hidden">
						<div class="text">
							<div class="cardname">${card.text}
							<div class="side">${side}</div>
							<div class="meaning">${meaning.text}</div>
						</div>
					</div>
				</div>
			`;
			attachFlipLogic(); // Gọi hàm flip

			// Cuộn tới cardbox vừa thêm
			const newCard = document.getElementById(`card-${currentDraw}`);
			if (newCard) {
				resultDiv.scroll({
					top: newCard.offsetTop - resultDiv.offsetTop, // Cuộn tới vị trí của phần tử trong `.result`
					behavior: 'smooth' // Cuộn mượt
				});
			}

			currentDraw++;

			// Nếu currentDraw vượt quá spreadCount, vô hiệu hóa nút DRAW
			if (currentDraw > spreadCount) {
				document.getElementById('draw').disabled = true;
				document.getElementById('clear').disabled = false; // Kích hoạt nút CLEAR
			}
		}
	});
	//CLEAR
	document.getElementById('clear').addEventListener('click', () => {
		// Reset tất cả trạng thái
		numberOfData = []; // Xóa sạch mảng dữ liệu
		usedValues.clear(); // Xóa tập hợp giá trị đã dùng

		// Xóa nội dung hiển thị
		const resultDiv = document.getElementById('result');
		resultDiv.innerHTML = ''; // Xóa tất cả nội dung trong `result`

		// Reset input và trạng thái các nút
		const spreadInput = document.getElementById('spreadSelect');
		spreadInput.value = ''; // Reset giá trị input về rỗng
		spreadInput.disabled = false; // Kích hoạt lại khung nhập input

		document.getElementById('randomButton').disabled = false; // Kích hoạt nút SET
		document.getElementById('draw').disabled = true; // Vô hiệu hóa nút DRAW
		document.getElementById('clear').disabled = true; // Vô hiệu hóa nút CLEAR

		// Reset trạng thái vẽ bài
		currentDraw = 2; // Đặt lại biến `currentDraw` về giá trị mặc định
	});

	//Flip
	function attachFlipLogic() {
		const cardboxes = document.querySelectorAll('.cardbox');
		cardboxes.forEach(cardbox => {
			const frontElement = cardbox.querySelector('.front');
			const backElement = cardbox.querySelector('.back');

			cardbox.addEventListener('click', () => {
				frontElement.classList.toggle('hidden');
				backElement.classList.toggle('hidden');
				});
		});
	}
//End Flip


// Bộ nhớ cache ảnh
const preloadedImages = {};

function preloadImages(dataArray, callback) {
	let loaded = 0;
	dataArray.forEach(item => {
		const img = new Image();
		img.src = item.img;
		img.onload = () => {
			preloadedImages[item.img] = img;
			loaded++;
			if (loaded === dataArray.length && callback) {
				callback();
			}
		};
	});
}

// Gọi preload khi trang load
window.addEventListener("load", () => {
	preloadImages(data1, () => {
		// tất cả ảnh đã preload xong
	});
});


</script>
</body>
</html>
